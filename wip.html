<style>
:root{--ink:#090b10;--card:#111620;--border:rgba(255,255,255,0.07);--text:#e8eaf0;--muted:#6b7280;--accent:#3b82f6;--accent2:#60a5fa;--dream:#f59e0b}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--ink);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh;display:flex;flex-direction:column}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(59,130,246,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,0.03) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 40%,transparent 100%);pointer-events:none}
nav{display:flex;align-items:center;justify-content:space-between;padding:20px 48px;border-bottom:1px solid var(--border);background:rgba(9,11,16,0.9);backdrop-filter:blur(16px)}
.nav-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;color:var(--text);text-decoration:none;display:flex;align-items:center;gap:10px}
.nav-back{color:var(--muted);text-decoration:none;font-size:12px;letter-spacing:0.08em;text-transform:uppercase;display:flex;align-items:center;gap:8px;transition:color 0.2s}
.nav-back:hover{color:var(--text)}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:60px 24px;position:relative;z-index:1}
.wrap{text-align:center;max-width:540px}
.glow{position:absolute;width:500px;height:500px;background:radial-gradient(circle,rgba(59,130,246,0.08) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
.badge{display:inline-flex;align-items:center;gap:8px;padding:6px 16px;border:1px solid var(--border);border-radius:100px;background:rgba(59,130,246,0.06);font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--accent2);margin-bottom:32px}
.title{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(40px,7vw,72px);line-height:0.95;letter-spacing:-0.03em;color:var(--text);margin-bottom:16px}
.title em{font-family:'Instrument Serif',serif;font-style:italic;font-weight:400;color:var(--muted)}
.sub{font-size:14px;color:var(--muted);line-height:1.8;margin-bottom:40px}
.gear{font-size:80px;display:block;margin-bottom:24px;animation:spin 8s linear infinite}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;background:var(--accent);border-radius:8px;color:#fff;font-family:'DM Mono',monospace;font-size:12px;letter-spacing:0.06em;text-transform:uppercase;text-decoration:none;transition:all 0.2s}
.btn:hover{background:var(--accent2);transform:translateY(-2px);box-shadow:0 8px 24px rgba(59,130,246,0.3)}
footer{padding:24px 48px;border-top:1px solid var(--border);text-align:center;font-size:11px;color:var(--muted);opacity:0.4}
@media(max-width:600px){nav{padding:14px 20px}}
</style>
</head>
